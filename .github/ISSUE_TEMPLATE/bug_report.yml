name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and expected vs actual behavior.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit/Version
      description: Commit SHA or release tag.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/screenshots
